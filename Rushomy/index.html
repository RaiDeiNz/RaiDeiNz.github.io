<!DOCTYPE html>
<html lang="en">
<title>Rushomy : More than a search engine.</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Raleway">
<link rel="shortcut icon" type="image/logo.ico" href="/q/R0.ico" size="any">
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
<style>
body,h1 {font-family: "Raleway", sans-serif}
body, html {height: 100%}
.bgimg {
  background-image: url('Rushomy2.jpg');
  min-height: 100%;
  background-position: center;
  background-size: cover;
}
  p {
  text-align: center;
  font-size: 60px;
  margin-top: 0px;
  font-family: 'Courier New', Courier, monospace;
  color: gold;
}
  h1 {
    font-family: 'Courier New';
    font-size: 40px;
    color: burlywood;
  }
</style>
<body bgcolor="black">
<div class="bgimg w3-display-container w3-animate-opacity w3-text-white">
  <div class="w3-display-topleft w3-padding-large w3-xlarge">
  </div>
  <div class="w3-display-middle w3-display-container">
    <h1 class="w3-border-yellow w3-animate-opacity container-fluid">We'll back soon.</h1>
  </div>
</div>
<footer>
  <div class="w3-black">
    <hr class="w3-border-yellow" style="margin:auto;width:100%">
    <p id="cd" class="w3-large w3-center"></p>
  </div>
</footer>
<script>
// Set the date we're counting down to
var countDownDate = new Date("Jun 28, 2025 23:59:59").getTime();

// Update the count down every 1 second
var x = setInterval(function() {

  // Get today's date and time
  var now = new Date().getTime();
    
  // Find the distance between now and the count down date
  var distance = countDownDate - now;
    
  // Time calculations for days, hours, minutes and seconds
  var days = Math.floor(distance / (1000 * 60 * 60 * 24));
  var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  var seconds = Math.floor((distance % (1000 * 60)) / 1000);
    
  // Output the result in an element with id="cd"
  document.getElementById("cd").innerHTML = "Açılışa Kalan Süre : " + days + " Gün " + hours + " Saat "
  + minutes +  " Dakika " + seconds + " Saniye ";
    
  // If the count down is over, write some text 
  if (distance < 0) {
    clearInterval(x);
    document.getElementById("cd").innerHTML = "Ups! Need More Time (Allah Affetsin!)";
  }
}, 1000);
</script>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
